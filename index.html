<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
        <!-- we import arjs version without NFT but with marker + location based support -->
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    </head>
    <body style="margin: 0px; overflow: hidden">
        <a-scene embedded arjs>
            <a-assets>
                <video
                    id="oof"
                    autoplay
                    loop="true"
                    src="./ar-res/videos/Oof.mp4"
                ></video>
            </a-assets>
            <a-marker
                type="pattern"
                preset="custom"
                url="./ar-res/marker/pattern-emi.patt"
            >
                <a-entity
                    position="0 0 0"
                    size="0.15"
                    scale="0.5 0.5 0.5"
                    gltf-model="./ar-res/models/cube.gltf"
                ></a-entity>
                <a-video
                    src="#oof"
                    width="16"
                    height="9"
                    position="0 0 1"
                ></a-video>
            </a-marker>
            <a-entity camera></a-entity>
        </a-scene>
    </body>
</html>
